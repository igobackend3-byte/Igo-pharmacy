<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Placed | IGO Pharmacy</title>
<meta name="robots" content="noindex,follow">
<link rel="stylesheet" href="css/style.css?v=20260717">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b4d3e'/%3E%3Ctext x='32' y='30' font-family='Arial,sans-serif' font-size='16' font-weight='800' fill='%23a8e600' text-anchor='middle'%3EIGO%3C/text%3E%3Ctext x='32' y='46' font-family='Arial,sans-serif' font-size='11' font-weight='700' fill='white' text-anchor='middle'%3EPHARMA%3C/text%3E%3C/svg%3E">
<style>
  .os-wrap{max-width:640px;margin:0 auto;text-align:center;}
  .os-check{width:74px;height:74px;border-radius:50%;background:#eef7e0;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .os-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow);text-align:left;margin-top:26px;}
  .os-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;color:var(--gray);}
  .os-row.total{border-top:1px solid var(--border);margin-top:8px;padding-top:12px;font-weight:800;color:var(--dark-green);font-size:16px;}
  .os-item{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:5px 0;color:var(--dark-green);}
</style>
</head>
<body>
<div class="top-bar">
  <div class="container">
    <div class="top-bar-left">
      <a href="tel:+917397789803">+91 73977 89803</a>
      <a href="https://wa.me/917397789803" target="_blank" rel="noopener">WhatsApp Support</a>
    </div>
  </div>
</div>
<header id="siteHeader">
  <div class="container nav-wrap">
    <a href="index.html" class="logo">
      <span class="logo-img-badge"><img src="img/igo-pharma-logo.png" alt="IGO Pharma" class="logo-img"></span>
    </a>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="orders.html">My Orders</a></li>
      </ul>
    </nav>
    <div class="header-cta">
      <a href="cart.html" class="icon-btn cart-icon-wrap" title="View Cart" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</header>
<main id="main">
<section class="sv-section" style="padding-top:48px;">
  <div class="container">
    <div class="os-wrap" id="osRoot">
      <div class="os-check">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#1b4d3e" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h1 style="color:var(--dark-green);font-size:clamp(22px,3vw,30px);font-family:'Poppins',sans-serif;">Order Placed Successfully</h1>
      <p style="color:var(--gray);margin-top:8px;" id="osSub">Thank you for your order.</p>
      <div class="os-card" id="osCard"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px;">
        <a id="osWaBtn" class="btn btn-primary" target="_blank" rel="noopener" style="display:none;">Confirm on WhatsApp</a>
        <a href="orders.html" class="btn btn-outline">My Orders</a>
        <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
      </div>
    </div>
  </div>
</section>
</main>
<footer>
  <div class="container">
    <div class="footer-bottom" style="border-top:none;">
      <span>&copy; 2026 IGO Pharmacy &mdash; an IGO Group of Companies brand.</span>
      <span><a href="index.html" style="text-decoration:underline;">Back to Home</a></span>
    </div>
  </div>
</footer>
<script src="js/cart.js?v=20260717"></script>
<script src="js/payment-config.js?v=20260717"></script>
<script src="js/checkout.js?v=20260717"></script>
<script>
(function(){
  var money = window.IGO_ORDERS.money;
  var usp = new URLSearchParams(window.location.search);
  var order = window.IGO_ORDERS.getOrder(usp.get('id'));
  var root = document.getElementById('osCard');
  if(!order){
    document.getElementById('osRoot').innerHTML = '<h1 style="color:var(--dark-green);">Order not found</h1><p style="color:var(--gray);margin:12px 0 20px;">We could not find this order on this device.</p><a href="shop.html" class="btn btn-primary">Back to Shop</a>';
    return;
  }
  var payLabel = { cod:'Cash on Delivery', razorpay:'Paid Online (Razorpay)', whatsapp:'WhatsApp Order' }[order.payment.method] || order.payment.method;
  var itemsHtml = order.items.map(function(i){
    return '<div class="os-item"><span>'+i.name+' × '+i.qty+'</span><span>'+money(i.price*i.qty)+'</span></div>';
  }).join('');
  root.innerHTML =
    '<div class="os-row"><span>Order ID</span><strong style="color:var(--dark-green);">'+order.id+'</strong></div>' +
    '<div class="os-row"><span>Placed</span><span>'+new Date(order.createdAt).toLocaleString('en-IN')+'</span></div>' +
    '<div class="os-row"><span>Payment</span><span>'+payLabel+'</span></div>' +
    '<div class="os-row"><span>Deliver to</span><span style="text-align:right;max-width:60%;">'+order.customer.name+', '+order.customer.city+' — '+order.customer.pincode+'</span></div>' +
    '<div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:8px;">'+itemsHtml+'</div>' +
    '<div class="os-row"><span>Subtotal</span><span>'+money(order.subtotal)+'</span></div>' +
    '<div class="os-row"><span>Shipping</span><span>'+(order.shipping?money(order.shipping):'FREE')+'</span></div>' +
    '<div class="os-row total"><span>Total</span><span>'+money(order.total)+'</span></div>';

  var waBtn = document.getElementById('osWaBtn');
  waBtn.href = window.IGO_ORDERS.orderWhatsAppLink(order);
  waBtn.style.display = 'inline-flex';
  if(order.payment.method === 'whatsapp'){
    document.getElementById('osSub').textContent = 'One last step — tap below to send your order to our team on WhatsApp for confirmation.';
    if(usp.get('wa') === '1'){ window.open(waBtn.href, '_blank'); }
  } else if(order.payment.method === 'cod'){
    document.getElementById('osSub').textContent = 'Our team will call ' + order.customer.phone + ' to confirm before dispatch. Keep ' + money(order.total) + ' ready on delivery.';
  } else {
    document.getElementById('osSub').textContent = 'Payment received. We will pack and dispatch your order shortly.';
  }
})();
</script>
</body>
</html>
