<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | IGO Pharmacy</title>
<meta name="robots" content="noindex,follow">
<link rel="stylesheet" href="css/style.css?v=20260717">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b4d3e'/%3E%3Ctext x='32' y='30' font-family='Arial,sans-serif' font-size='16' font-weight='800' fill='%23a8e600' text-anchor='middle'%3EIGO%3C/text%3E%3Ctext x='32' y='46' font-family='Arial,sans-serif' font-size='11' font-weight='700' fill='white' text-anchor='middle'%3EPHARMA%3C/text%3E%3C/svg%3E">
<style>
  .ord-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px;}
  .ord-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
  .ord-id{font-weight:800;color:var(--dark-green);}
  .ord-status{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:999px;background:#fff4d6;color:#7a5b00;text-transform:uppercase;letter-spacing:.03em;}
  .ord-status.confirmed{background:#eef7e0;color:#0f2e21;}
  .ord-items{font-size:13px;color:var(--gray);line-height:1.7;}
  .ord-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px;}
</style>
</head>
<body>
<div class="top-bar">
  <div class="container">
    <div class="top-bar-left">
      <a href="tel:+917397789803">+91 73977 89803</a>
      <a href="https://wa.me/917397789803" target="_blank" rel="noopener">WhatsApp Support</a>
    </div>
  </div>
</div>
<header id="siteHeader">
  <div class="container nav-wrap">
    <a href="index.html" class="logo">
      <span class="logo-img-badge"><img src="img/igo-pharma-logo.png" alt="IGO Pharma" class="logo-img"></span>
    </a>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="deals.html">Deals</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
    <div class="header-cta">
      <a href="cart.html" class="icon-btn cart-icon-wrap" title="View Cart" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</header>
<main id="main">
<section class="sv-section" style="padding-top:36px;">
  <div class="container" style="max-width:820px;">
    <div class="section-head">
      <div class="eyebrow">Order History</div>
      <h1 style="color:var(--dark-green);font-size:clamp(24px,3vw,32px);font-family:'Poppins',sans-serif;font-weight:700;">My Orders</h1>
      <p style="color:var(--gray);margin-top:8px;font-size:13.5px;">Orders placed from this browser. For help with any order, message us on WhatsApp with your Order ID.</p>
    </div>
    <div id="ordersRoot"></div>
  </div>
</section>
</main>
<footer>
  <div class="container">
    <div class="footer-bottom" style="border-top:none;">
      <span>&copy; 2026 IGO Pharmacy &mdash; an IGO Group of Companies brand.</span>
      <span><a href="index.html" style="text-decoration:underline;">Back to Home</a></span>
    </div>
  </div>
</footer>
<script src="js/cart.js?v=20260717"></script>
<script src="js/payment-config.js?v=20260717"></script>
<script src="js/checkout.js?v=20260717"></script>
<script>
(function(){
  var money = window.IGO_ORDERS.money;
  var orders = window.IGO_ORDERS.getOrders();
  var root = document.getElementById('ordersRoot');
  if(!orders.length){
    root.innerHTML = '<div class="ord-card" style="text-align:center;"><p style="margin-bottom:14px;">No orders yet.</p><a href="shop.html" class="btn btn-primary">Start Shopping</a></div>';
    return;
  }
  root.innerHTML = orders.map(function(o){
    var items = o.items.map(function(i){ return i.name + ' × ' + i.qty; }).join(', ');
    var payLabel = { cod:'Cash on Delivery', razorpay:'Paid Online', whatsapp:'WhatsApp Order' }[o.payment.method] || o.payment.method;
    return '<div class="ord-card">' +
      '<div class="ord-head"><span class="ord-id">'+o.id+'</span>' +
      '<span class="ord-status '+(o.status==='confirmed'?'confirmed':'')+'">'+(o.status==='confirmed'?'Confirmed':'Pending confirmation')+'</span></div>' +
      '<div style="font-size:12.5px;color:var(--gray);margin-bottom:6px;">'+new Date(o.createdAt).toLocaleString('en-IN')+' · '+payLabel+'</div>' +
      '<div class="ord-items">'+items+'</div>' +
      '<div class="ord-foot"><strong style="color:var(--dark-green);">Total: '+money(o.total)+'</strong>' +
      '<span><a href="order-success.html?id='+encodeURIComponent(o.id)+'" class="btn btn-outline" style="font-size:12.5px;padding:8px 14px;">View</a> ' +
      '<a href="https://wa.me/917397789803?text='+encodeURIComponent('Hi, I need help with my order '+o.id)+'" target="_blank" rel="noopener" class="btn btn-outline" style="font-size:12.5px;padding:8px 14px;">Get Help</a></span></div>' +
    '</div>';
  }).join('');
})();
</script>
</body>
</html>
